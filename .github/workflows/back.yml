name: Backend CI

# Build e testes do backend Spring Boot. Os testes de integracao usam
# Testcontainers (Postgres efemero) — o runner ubuntu ja tem Docker.

on:
  push:
    branches: [main]
    paths:
      - 'api-osals.java/**'
      - '.github/workflows/back.yml'
  pull_request:
    paths:
      - 'api-osals.java/**'
      - '.github/workflows/back.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-osals.java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Gerar chaves RSA do JWT
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out keys/chave-privada.pem
          openssl rsa -pubout -in keys/chave-privada.pem -out keys/chave-publica.pem

      - name: Build, testes e cobertura
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress verify

      - name: Publicar relatorio de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: api-osals.java/target/site/jacoco/
          if-no-files-found: ignore
